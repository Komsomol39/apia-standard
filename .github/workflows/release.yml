name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

jobs:
  test:
    name: Run CI before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install pytest jsonschema
      - run: pytest tests/ -v --tb=short
      - run: python tools/check_registry.py

  release:
    name: GitHub Release + PyPI
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build twine

      - name: Extract version
        id: ver
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update version in pyproject.toml
        run: |
          sed -i 's/^version = .*/version = "${{ steps.ver.outputs.version }}"/' pyproject.toml

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.ver.outputs.version }}';
            const { readFileSync } = require('fs');
            const changelog = readFileSync('CHANGELOG.md', 'utf8');
            const match = changelog.match(
              new RegExp(`## \\[${version.replace('.','\\.')}\\][^\n]*\n([\s\S]*?)(?=## \\[|$)`)
            );
            const body = match ? match[1].trim() : `Release ${version}. See CHANGELOG.md.`;
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${version}`,
              name: `APIA Standard v${version}`,
              body,
              draft: false,
              prerelease: version.includes('alpha') || version.includes('beta') || version.includes('rc'),
            });
            console.log('Release:', data.html_url);

      - name: Publish to PyPI
        if: ${{ secrets.PYPI_API_TOKEN != '' }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
