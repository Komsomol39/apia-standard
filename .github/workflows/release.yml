name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Create GitHub Release + Publish to PyPI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build twine

      - name: Run CI checks
        run: |
          pip install pytest jsonschema
          pytest tests/ -v --tb=short
          python tools/check_registry.py

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update version in pyproject.toml
        run: |
          sed -i 's/^version = .*/version = "${{ steps.version.outputs.version }}"/' pyproject.toml

      - name: Build package
        run: python -m build

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(python3 -c "
          import re
          text = open('CHANGELOG.md').read()
          pattern = rf'## \[{re.escape(VERSION)}\].*?(?=## \[|\Z)'
          m = re.search(pattern, text, re.DOTALL)
          print(m.group(0).strip() if m else 'See CHANGELOG.md')
          ")
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const { data: release } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: context.ref.replace('refs/tags/', ''),
              name: `APIA Standard ${{ steps.version.outputs.version }}`,
              body: `${{ steps.changelog.outputs.notes }}`,
              draft: false,
              prerelease: '${{ steps.version.outputs.version }}'.includes('alpha') ||
                          '${{ steps.version.outputs.version }}'.includes('beta') ||
                          '${{ steps.version.outputs.version }}'.includes('rc'),
            });
            console.log(`Created release: ${release.html_url}`);

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
