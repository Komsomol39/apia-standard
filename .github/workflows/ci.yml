name: APIA CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest jsonschema

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Validate sample manifests via CLI
        run: |
          python cli/apia.py validate manifests/stripe/apia.json
          python cli/apia.py validate manifests/openai/apia.json
          python cli/apia.py validate manifests/open-meteo/apia.json

      - name: Full registry integrity check
        run: python tools/check_registry.py

  demo:
    name: End-to-end demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run weather demo
        run: python examples/weather_demo.py

      - name: Test CLI search
        run: python cli/apia.py search weather

      - name: Test CLI inspect
        run: python cli/apia.py inspect open-meteo

      - name: Test CLI build-prompt
        run: python cli/apia.py build-prompt weather Berlin

      - name: Test python -m apia
        run: python -m apia search stripe
