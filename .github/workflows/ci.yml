name: APIA CI

on:
  push:
    branches: [main, harden-standard-v1]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest jsonschema

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Validate all manifests via CLI
        run: python cli/apia.py validate --all

      - name: Check registry integrity
        run: |
          python3 << 'EOF'
          import json, glob
          registry = json.load(open('registry.json'))
          manifests = glob.glob('manifests/*/apia.json')
          print(f"Registry entries: {len(registry['manifests'])}")
          print(f"Manifest files:   {len(manifests)}")
          assert len(registry['manifests']) == len(manifests), "Count mismatch!"
          print("OK: registry count matches manifest files")
          EOF

  demo:
    name: Run end-to-end demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run weather demo (no auth required)
        run: python examples/weather_demo.py

      - name: Test CLI search
        run: |
          python cli/apia.py search weather
          python cli/apia.py search flight status
          python cli/apia.py inspect open-meteo
