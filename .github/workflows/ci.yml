name: APIA CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest jsonschema

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Validate sample manifests via CLI
        run: |
          python cli/apia.py validate manifests/stripe/apia.json
          python cli/apia.py validate manifests/openai/apia.json
          python cli/apia.py validate manifests/open-meteo/apia.json

      - name: Check registry integrity
        run: |
          python3 -c "
          import json, glob
          from pathlib import Path
          registry = json.loads(Path('registry.json').read_text())
          manifests = list(Path('manifests').glob('*/apia.json'))
          print(f'Registry entries: {len(registry["manifests"])}')
          print(f'Manifest files:   {len(manifests)}')
          assert len(registry['manifests']) == len(manifests), f'Mismatch: {len(registry["manifests"])} vs {len(manifests)}'
          print('OK')
          "

  demo:
    name: End-to-end demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run weather demo
        run: python examples/weather_demo.py

      - name: Test CLI commands
        run: |
          python cli/apia.py search weather
          python cli/apia.py inspect open-meteo
          python cli/apia.py build-prompt "get current weather in Berlin"
