name: APIA CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Validate sample manifests via CLI
        run: |
          python cli/apia.py validate manifests/stripe/apia.json
          python cli/apia.py validate manifests/openai/apia.json
          python cli/apia.py validate manifests/open-meteo/apia.json

      - name: Check registry integrity
        run: |
          python3 -c "
import json, os
from pathlib import Path

registry = json.loads(Path('registry.json').read_text())
manifests = list(Path('manifests').glob('*/apia.json'))
reg_n = len(registry['manifests'])
file_n = len(manifests)
print(f'Registry entries: {reg_n}')
print(f'Manifest files:   {file_n}')
assert reg_n == file_n, f'Mismatch: {reg_n} vs {file_n}'
print('OK: counts match')
"

  demo:
    name: End-to-end demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run weather demo
        run: python examples/weather_demo.py

      - name: Test CLI search
        run: python cli/apia.py search weather

      - name: Test CLI inspect
        run: python cli/apia.py inspect open-meteo

      - name: Test CLI build-prompt
        run: python cli/apia.py build-prompt "get weather in Berlin"
