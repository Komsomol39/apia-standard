name: APIA CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pytest jsonschema

      - name: Run tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          pytest tests/ -v --tb=short

      - name: Validate all manifests via CLI
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python cli/apia.py validate --all

      - name: Check registry integrity
        run: |
          python3 -c "
          import json, glob
          registry = json.load(open('registry.json'))
          manifests = glob.glob('manifests/*/apia.json')
          print(f'Registry entries: {len(registry["manifests"])}')
          print(f'Manifest files:   {len(manifests)}')
          assert len(registry['manifests']) == len(manifests), f'Count mismatch: {len(registry["manifests"])} vs {len(manifests)}'
          print('OK: counts match')
          "

  demo:
    name: End-to-end demo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run weather demo
        run: python examples/weather_demo.py

      - name: Test CLI commands
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          echo "--- search weather ---"
          python cli/apia.py search weather
          echo "--- search flight status ---"
          python cli/apia.py search flight status
          echo "--- inspect open-meteo ---"
          python cli/apia.py inspect open-meteo
          echo "--- build-prompt ---"
          python cli/apia.py build-prompt "get current weather in Berlin"
