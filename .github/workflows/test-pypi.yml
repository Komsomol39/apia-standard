name: Test PyPI Publish

on:
  push:
    paths:
      - 'pypi-test-trigger'

permissions:
  contents: write

jobs:
  test-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build package
        run: |
          pip install build twine -q
          python -m build

      - name: Try publish with GH_TOKEN
        id: publish
        run: |
          echo "Testing if GH_TOKEN works as PyPI token..."
          RESULT=$(TWINE_USERNAME=__token__ TWINE_PASSWORD=${{ secrets.GH_TOKEN }} \
            twine upload dist/* --verbose 2>&1 || true)
          echo "$RESULT" > pypi-test-result.txt
          echo "$RESULT"

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: pypi test result"
          file_pattern: "pypi-test-result.txt"
