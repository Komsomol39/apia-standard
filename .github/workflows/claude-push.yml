name: Claude to GitHub

on:
  repository_dispatch:
    types: [claude-push]

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write file from payload
        run: |
          mkdir -p $(dirname "${{ github.event.client_payload.path }}")
          cat > "${{ github.event.client_payload.path }}" << 'FILECONTENT'
          ${{ github.event.client_payload.content }}
          FILECONTENT

      - name: Commit and push
        run: |
          git config user.name 'Claude Bot'
          git config user.email 'claude@apia.dev'
          git add .
          git diff --staged --quiet || git commit -m "${{ github.event.client_payload.message }}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
