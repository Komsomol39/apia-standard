name: Weekly Endpoint Health Check

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  health-check:
    name: Check API endpoints
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run endpoint health check
        id: health
        run: |
          python tools/check_endpoints.py --fail-threshold 30 --output endpoint-health.json
          python3 -c "
          import json
          r = json.load(open('endpoint-health.json'))
          s = r['summary']
          print('alive=' + str(s['alive']))
          print('dead=' + str(s['dead']))
          print('geo_blocked=' + str(s['geo_blocked']))
          print('dead_pct=' + str(s['dead_pct']))
          " | tee -a $GITHUB_OUTPUT

      - name: Commit health report via API
        run: |
          python3 << 'PYEOF'
          import json, base64, subprocess, urllib.request, os

          token = os.environ['GITHUB_TOKEN']
          repo  = os.environ['GITHUB_REPOSITORY']

          # Читаем файл
          content = open('endpoint-health.json', 'rb').read()
          encoded = base64.b64encode(content).decode()

          # Получаем текущий SHA файла
          url = f'https://api.github.com/repos/{repo}/contents/endpoint-health.json'
          req = urllib.request.Request(url,
              headers={'Authorization': f'token {token}', 'Accept': 'application/vnd.github+json'})
          try:
              with urllib.request.urlopen(req) as r:
                  sha = json.loads(r.read())['sha']
          except:
              sha = None

          # Коммитим через API
          body = {
              'message': f"chore(health): weekly check — ${{ steps.health.outputs.alive }} alive, ${{ steps.health.outputs.dead }} dead",
              'content': encoded
          }
          if sha:
              body['sha'] = sha

          req2 = urllib.request.Request(url,
              data=json.dumps(body).encode(), method='PUT',
              headers={'Authorization': f'token {token}',
                       'Content-Type': 'application/json',
                       'Accept': 'application/vnd.github+json'})
          with urllib.request.urlopen(req2) as r:
              print('Health report committed:', r.status)
          PYEOF
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Open issue if too many dead endpoints
        if: steps.health.outputs.dead_pct > 30
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('endpoint-health.json'));
            const s = report.summary;
            const dead = report.entries
              .filter(e => e.status === 'DEAD')
              .map(e => `- \`${e.id}\`: ${e.url} — ${e.error || e.http_status}`)
              .slice(0, 25).join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Health check: ${s.dead} dead endpoints (${s.dead_pct}%)`,
              body: `## Weekly Endpoint Health Check\n\n**${s.alive} alive / ${s.dead} dead / ${s.geo_blocked} geo-blocked**\n\n### Dead endpoints\n${dead}`,
              labels: ['maintenance']
            });
