name: Weekly Endpoint Health Check

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  health-check:
    name: Check API endpoints
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run endpoint health check
        id: health
        run: |
          python tools/check_endpoints.py --fail-threshold 30 --output endpoint-health.json
          ALIVE=$(python3 -c "import json; r=json.load(open('endpoint-health.json')); print(r['summary']['alive'])")
          DEAD=$(python3 -c "import json; r=json.load(open('endpoint-health.json')); print(r['summary']['dead'])")
          GEO=$(python3 -c "import json; r=json.load(open('endpoint-health.json')); print(r['summary']['geo_blocked'])")
          PCT=$(python3 -c "import json; r=json.load(open('endpoint-health.json')); print(r['summary']['dead_pct'])")
          echo "alive=$ALIVE" >> $GITHUB_OUTPUT
          echo "dead=$DEAD" >> $GITHUB_OUTPUT
          echo "geo_blocked=$GEO" >> $GITHUB_OUTPUT
          echo "dead_pct=$PCT" >> $GITHUB_OUTPUT
          echo "Results: alive=$ALIVE dead=$DEAD geo=$GEO dead_pct=$PCT%"

      - name: Upload health report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: endpoint-health-${{ github.run_id }}
          path: endpoint-health.json
          retention-days: 90

      - name: Open issue if too many dead endpoints
        if: steps.health.outputs.dead_pct > 30
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('endpoint-health.json'));
            const s = report.summary;
            const dead = report.entries
              .filter(e => e.status === 'DEAD')
              .map(e => `- \`${e.id}\`: ${e.url} — ${e.error || e.http_status}`)
              .slice(0, 25).join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Health check: ${s.dead} dead endpoints (${s.dead_pct}%)`,
              body: `## Weekly Endpoint Health Check\n\n**${s.alive} alive / ${s.dead} dead / ${s.geo_blocked} geo-blocked**\n\n### Dead endpoints\n${dead}`,
              labels: ['maintenance']
            });
