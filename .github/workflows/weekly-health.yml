name: Weekly Endpoint Health Check

on:
  schedule:
    - cron: '0 6 * * 1'   # Каждый понедельник в 06:00 UTC
  workflow_dispatch:        # Ручной запуск

permissions:
  contents: write
  issues: write

jobs:
  health-check:
    name: Check API endpoints
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run endpoint health check
        id: health
        run: |
          python tools/check_endpoints.py --fail-threshold 30 --output endpoint-health.json
          echo "dead_pct=$(python3 -c "import json; r=json.load(open('endpoint-health.json')); print(r['summary']['dead_pct'])")" >> $GITHUB_OUTPUT
          echo "alive=$(python3 -c "import json; r=json.load(open('endpoint-health.json')); print(r['summary']['alive'])")" >> $GITHUB_OUTPUT
          echo "dead=$(python3 -c "import json; r=json.load(open('endpoint-health.json')); print(r['summary']['dead'])")" >> $GITHUB_OUTPUT

      - name: Commit health report
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(health): weekly endpoint check — ${{ steps.health.outputs.alive }} alive, ${{ steps.health.outputs.dead }} dead"
          file_pattern: "endpoint-health.json"

      - name: Open issue if too many dead endpoints
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = {};
            try { report = JSON.parse(fs.readFileSync('endpoint-health.json')); } catch(e) {}
            const summary = report.summary || {};
            const dead = (report.entries || [])
              .filter(e => e.alive === false)
              .map(e => `- \`${e.id}\`: ${e.url} (${e.error || e.status})`)
              .slice(0, 20)
              .join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Endpoint health check: ${summary.dead} dead endpoints (${summary.dead_pct}%)`,
              body: `## Weekly Endpoint Health Check Failed

**${summary.alive} alive** / **${summary.dead} dead** / ${summary.skipped} skipped

Dead rate: **${summary.dead_pct}%** (threshold: 30%)

### Dead endpoints (first 20):
${dead}

Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
`,
              labels: ['maintenance', 'health']
            });
