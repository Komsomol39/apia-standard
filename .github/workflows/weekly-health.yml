name: Weekly Endpoint Health Check

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  health-check:
    name: Check API endpoints
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run endpoint health check
        id: health
        run: |
          python tools/check_endpoints.py --fail-threshold 30 --output endpoint-health.json
          python3 -c "
          import json
          r = json.load(open('endpoint-health.json'))
          s = r['summary']
          print(f'alive={s["alive"]}')
          print(f'dead={s["dead"]}')
          print(f'geo_blocked={s["geo_blocked"]}')
          print(f'dead_pct={s["dead_pct"]}')
          " | tee -a $GITHUB_OUTPUT

      - name: Commit health report
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(health): weekly check — ${{ steps.health.outputs.alive }} alive, ${{ steps.health.outputs.dead }} dead"
          file_pattern: "endpoint-health.json"

      - name: Open issue if too many dead endpoints
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('endpoint-health.json'));
            const s = report.summary;
            const dead = report.entries
              .filter(e => e.status === 'DEAD')
              .map(e => `- \`${e.id}\`: ${e.url} — ${e.error || e.http_status}`)
              .slice(0, 25).join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `⚠️ Health check: ${s.dead} dead endpoints (${s.dead_pct}%)`,
              body: `## Weekly Endpoint Health Check\n\n**${s.alive} alive / ${s.dead} dead / ${s.geo_blocked} geo-blocked**\n\n### Dead endpoints\n${dead}`,
              labels: ['maintenance']
            });
